    <style>
      :root {
        --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f8fafc;
        --color-border-primary: #cbd5e1;
        --color-border-secondary: #e2e8f0;
        --color-border-tertiary: #f1f5f9;
        --color-text-primary: #0f172a;
        --color-text-secondary: #475569;
        --color-text-tertiary: #94a3b8;
        --color-primary: #0284c7; /* Sky Blue */
        --color-primary-hover: #0369a1;
        --color-accent: #b91c1c; /* Crimson / Red for alerts */
        --border-radius-lg: 12px;
        --border-radius-md: 8px;
        --border-radius-sm: 4px;
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      }
      
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--color-background-secondary);
        color: var(--color-text-primary);
        line-height: 1.5;
        overflow-x: hidden;
      }
    </style>
    <!-- Local Business & FAQ Schema (JSON-LD) -->
    <script type="application/ld+json">

      "@context": "https://schema.org",

          "@id": "https://basinincident.com/#organization",
          "name": "Texas Pipeline Safety Board",

          "logo": "https://basinincident.com/images/logo.png",

          "telephone": "+1-800-555-0199",
          "priceRange": "$$$",
          "knowsAbout": [
            "Pipeline Explosion Lawsuits",
            "Hydrogen Sulfide Gas Poisoning claims",
            "Saltwater Pipeline Spill Property Damage",
            "Oilfield Injury Third-Party Claims"

          "areaServed": [
            {

              "name": "Texas"
            }
          ],
          "address": {

            "addressLocality": "Midland",
            "addressRegion": "TX",
            "postalCode": "79701",

          }
        },
        {
          "@type": "FAQPage",
          "@id": "https://txpipelineboard.com/incidents/saltwater-spills-produced-water/#faq",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Who is responsible for produced water spill cleanup on my Texas land?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "The pipeline operator or midstream company who operates the saltwater line is legally responsible for produced water spills. Under Texas common law and Railroad Commission (RRC) rules, operators must remediate the soil and compensate landowners for lost land value, crop damage, and livestock loss."
              }
            },
            {
              "@type": "Question",
              "name": "Can an injured oilfield worker sue the pipeline operator if they are on workers comp?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. While workers comp prevents you from suing your direct employer, it does not prevent you from filing a third-party lawsuit against the pipeline operator, midstream company, or equipment manufacturer whose negligence caused the explosion or gas leak."
              }
            }
          ]
        }
      ]
    }
